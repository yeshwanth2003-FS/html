<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nav bar</title>
    <style>
        *{
              padding: opx;
              margin: 0px;
              box-sizing: border-box;
              font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }
        .parent{
            background-color: black;
            color: aliceblue;
            margin: 100px;
            display: flex;
            justify-content: space-between;
            padding: 20px;
            border-radius: 50px;
           
        }

        .logo img{
            background-color: aliceblue;
            height: 60px;
            width: 60px;
           
            display: flex;
            align-items: center;
            border-radius: 20px;
          
           
        }
        .menu{
            background-color: aliceblue;
            border-radius: 300px;
            padding: 10px;
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
        }
        .head{
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="logo">
           <img src="../assests/photos/nav/1.jpg" alt=""></div>
<div class="head">
         <h1>FoodHub</h1>
        </div>

        <div class="menu">
          <a href="">Home</a>
            <a href="">Menu</a>
              <a href="">Offers</a>
                <a href="">Gallery</a>
                  <a href="">Contact</a>
        </div>
    </div>
 
</body> 
</html>
