<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>marvel card layout</title>
    <style>
        *{
                padding: opx;
                margin: 0px;
                box-sizing: border-box;
                font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;        }
        .parent{
            background-color: rgb(10, 10, 10);
            height: 800px;
            display: flex;
           
            flex-direction: column;
          
            
          

        }
        .child{
            background-color: red;
            color: aliceblue;
            text-align: center;
            margin-bottom: 50px;
            display: flex;
            flex-direction: row;
            justify-content: center;
            padding-top: 50px;
            padding-bottom: 50px;
          
        }
        .dot{
            display: flex;
            justify-content: center;
            gap: 50px;
            font-size: small;
            text-overflow: auto;
        }
        .para{
            background-color: rgb(248, 247, 247);
            color: rgb(19, 19, 19);
            border-radius:10px;
            display: flex;
            flex-direction: column;
            padding-bottom: 20px;
           
            
           
            
        }
        .para img{
            height: 280px;
            width: 280px;
        }
        .box{
             word-wrap: break-word;
             line-height: 20px;
             padding: 10px;
             margin-top: 10px;
            
        }
        button {

            background-color: rgb(223, 101, 101);
            border-radius: 50px;
        }

    </style>
</head>
<body>
    <div class="parent">

        <div class="child">
                       <h1>Marvel Studios</h1>
                       </div>
         <div class="dot">             
        <div class="para">
            <img src="../assests/photos/marvel 2/spider.jpg" alt="spider">
             <div class="box">         
            <h2>Spider-Man</h2><br>
            <p>neighborhood superhero with spider-like abilities</p><br>
            <button>read more..</button>
             </div>  
        </div>
        <div class="para">
            <img src="../assests/photos/marvel 2/iron.jpg" alt="iron">
            <div  class="box">  
            <h2>Iron Man</h2><br>
            <p>Genius billionaire Tony Stark fights enemies</p><br>
             <button>read more..</button>
            </div>
        </div>
        <div class="para">
            <img src="../assests/photos/marvel 2/hulk.jpg" alt="hulk">
            <div  class="box">
            <h2>Hulk</h2><br>
            <p>superhero with unlimited strength</p><br>
              <button>read more..</button>
            </div>
        </div>
        <div class="para">
                <img src="../assests/photos/marvel 2/thor.jpg" alt="thor">
                <div  class="box">
                <h2>Thor</h2> <br>
            <p> who controls lightning using his magical hammer</p><br>
              <button>read more..</button>
            </div>

        </div>
       </div> 
    </div>
    
</body>
</html>
