<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>box</title>
    <style>
    *{
        padding: opx;
        margin: 0px;
        box-sizing: border-box;
    }
         
    .parent{
        background-color: rgb(226, 18, 18);
        color: aliceblue;
        padding: auto;
        display: flex;
        gap: 10px;
        justify-content: center;
        align-items: center;
        height: 500px;
        
    }
    .child{
        background-color: rgb(245, 244, 239);
        color: rgb(224, 11, 11);
        height: 300px;
        width: 300px;
        padding:100px;
        font-size: 40px;
        border-radius: 10px;
    }

    </style>
</head>
<body>
    <div class="parent">
    <div>
        <p class="child">box 1</p>
    </div>
    <div>
        <p class="child">box 2</p>
    </div>
    <div>
        <p class="child">box 3</p>
    </div>
    <div>
        <p class="child">box 4</p>
    </div>
    </div>
</body>
</html>
