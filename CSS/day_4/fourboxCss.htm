<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>box</title>
    <style>
    *{
        padding: opx;
        margin: 0px;
        box-sizing: border-box;
      font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
    }
         
    .parent{
        background-color: rgb(226, 18, 18);
        color: aliceblue;
        padding: auto;
        display: flex;
        gap: 10px;
        justify-content: center;
        align-items: center;
        height: 500px;
        
    }
    .child{
        background-color: rgb(245, 244, 239);
        color: rgb(224, 11, 11);
        height: 200px;
        width: 200px;
        font-size: 20px;
        padding-top: 80px;
        padding-bottom: 100px;
        padding-left: 80px;
        padding-right: 100px;
        border-radius: 10px;
    }
    .top{
        background-color: black;
        color: aliceblue;
        text-align: center;
        padding-top: 100px;
    
    }

    </style>
</head>
<body>       
  
    <div class="parent">
   <div class="top">
        <h1>5 boxes</h1>
    </div>
    <div>
        <p class="child">box 1</p>
    </div>
    <div>
        <p class="child">box 2</p>
    </div>
    <div>
        <p class="child">box 3</p>
    </div>
    <div>
        <p class="child">box 4</p>
    </div>
     <div>
        <p class="child">box 5</p>
    </div>
    </div>
</body>
</html>
