<html>
    <head>
        <title>college admission</title>
    </head>
    <body>
        <section>
            <div>
                <form>
                    <h1><u>College admission</u></h1>
                    <fieldset>
                        <legend>Personal Details</legend>

                        <label >Full Name</label>
                        <input type="text" placeholder="Enter your full name"> <br><br>
                        <label >Father's Name</label>
                        <input type="text" placeholder="Enter father's name"><br><br>
                        <label >Mother's Name</label>
                        <input type="text" placeholder="Enter mother's name"><br><br>
                        <label >Date of Birth </label>
                        <input type="date"><br><br>
                        <label >Gender</label>
                        <input type="radio" name="gender"> Male
                         <input type="radio" name="gender"> Female
                          <input type="radio" name="gender"> Others <br><br>
                        <label>Phone Number</label>
                        <input type="tel" maxlength="10" placeholder="91+"> <br><br>
                        <label>Email Address</label>
                        <input type="email" placeholder="Enter your phone number"> <br><br>
                        <label>Address</label>
                        <textarea cols="30" rows="4" ></textarea>

                    </fieldset> <br><br>
                    <fieldset>
                        <legend> Course Selection</legend> <br>
                        <label for="Course">Select department</label>
                       <select id="Course">
                        <optgroup label="Engineering">
                            <option value="" selected disabled>choose one</option>
                            <option value="Computer Science Engineering">Computer Science Engineering</option>
                            <option value="Information Technology">Information Technology</option>
                             <option value="Mechanical Engineering">Mechanical Engineering</option>
                              <option value="Civil Engineering">Civil Engineering</option>
                               <option value="Electronics and Communication Engineering">Electronics and Communication Engineering</option>
                                
                        </optgroup>
                        <optgroup label="Arts & Science">
                            <option value="BCA">BCA</option>
                             <option value="B.Sc Computer Science">B.Sc Computer Science</option>
                              <option value="B.Com">B.Com</option>
                               <option value="BBA">BBA</option>
                                <option value="English Literature">English Literature</option>

                        </optgroup>
                        <optgroup label="Management">
                         <option value="">MBA</OPtion>
                         <option value="">MCA</option>
                         </OPtgroup>

                     



                       </select> <br><br>
                       <label >Shift Timing </label>
                       <input type="radio" name="shift"> Morning
                       <input type="radio" name="shift"> Evening <br><br>

                         <label >Mode of Study </label>
                       <input type="radio" name="shift"> Full Time
                       <input type="radio" name="shift"> Part Time
                        
                    </fieldset> <br><br>
                    <fieldset>
                         <legend> Document Upload</legend>
                        
                         <label >Upload Passport Size Photo</label>
                         <input type="file"> <br><br>
                         <label >Upload 10th Marksheet</label>
                         <input type="file"><br><br>
                         <label >Upload 12th Marksheet</label>
                         <input type="file"><br><br>
                         <label >Upload Transfer Certificate</label>
                         <input type="file"><br><br>


                    </fieldset>
                    <fieldset>
                        <legend> Declaration</legend>
                        <input type="checkbox">I hereby declare that all the above details are true and correct <br>
                        <input type="checkbox">I agree to the college rules and regulations

                    </fieldset>

                    <br><br>
                    <input type="submit">
                    <input type="reset">
















                </form>
            </div>
        </section>


    </body>
</html>
