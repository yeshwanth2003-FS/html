<html>
    <head><title> Student Registration Form</title>
    </head>
    <body>
        <center>
            <section>
                <form>
            <div>
                <h1> Student Registration Form</h1><br><br>
                <label">Name</label>
                <input type="text" placeholder="Enter your full name"><br><br>
                <label"> Father Name</label>
                <input type="text"><br><br>
                <label"> Mother Name</label>
                <input type="text"><br><br>
                <label"> Date of Birth</label>
                <input type="date"><br><br>
                <label"> Gender</label>
                <input type="radio" name="Gender"> Male
                <input type="radio" name="Gender"> Female <br><br>
                <label"> Email Address</label>
                <input type="email"><br><br>
                <label"> Address</label>
                <textarea name="adress"  cols="30" rows="4"></textarea><br><br>
                <label for="course"> Course Name</label>
                <select name="course" id="course">
                    <option value="" selected disabled>choose one</option>
                    <option value="course">BCA</option>
                     <option value="course">BSc Computer Science</option>
                      <option value="course">BSC IT</option>
                       <option value="course">BCOM</option>
                        <option value="course">BBA</option>
                         <option value="course">BA ENGLISH</option>
                          <option value="course">BA TAMIL</option>
                           <option value="course">B TECH IT</option>
                            <option value="course">B TECH CSE</option>
                             <option value="course">Mechanical Engineering</option>
                              <option value="course">Civil Engineering</option>
                               <option value="course">ECE</option>
                                <option value="course">EEE</option>
                                 <option value="course">MCA</option>
                                  <option value="course">MSc Computer Science</option>
                                   <option value="course">MCOM</option>
                                    <option value="course">MBA</option>
                </select><br><br>
                <label"> Phone Number</label>
                <input type="number" maxlength="10"><br><br>
                <label for="department"> Department</label>
                <select name="department" id="department">
                    <option value="" selected disabled>choose one</option>
                    <option value="course">Computer Science</option>
                     <option value="course">Information Technology</option>
                      <option value="course">Artificial Intelligence</option>
                       <option value="course">Cyber Security</option>
                        <option value="course">Data Science</option>
                         <option value="course">Commerce</option>
                          <option value="course">Business Administration</option>
                           <option value="course">English</option>
                            <option value="course">Tamil</option>
                             <option value="course">Mathematics</option>
                              <option value="course">Chemistry</option>
                               <option value="course">Physics</option>
                                <option value="course">Mechanical Engineering</option>
                                 <option value="course">Civil Engineering</option>
                                  <option value="course">MSc Computer Science</option>
                                   <option value="course">Electronics and Communication</option>
                                    <option value="course">Electrical and Electronics Engineering</option>
                </select><br><br>
                <label"> Year</label>
                <input type="radio" name="year"> 1 <sup>st</sup>
                <input type="radio" name="year"> 2<sup>nd</sup>
                <input type="radio" name="year">3<sup>nd</sup> <br><br>
                <label"> Roll Number </label>
                <input type="number" maxlength="8"><br><br>
                <label"> Blood Group</label>
                <input type="text"><br><br>
                <label"> Aadhaar Number (optional)</label>
                <input type="number" maxlength="15"><br><br>
                <label"> Profile Photo Upload</label>
                <input type="image"><br><br>
                <label>Password</label>
                <input type="password"><br><br>
                <input type="submit"><br><br>
                <input type="reset"><br>
                </form>


            </div>
        </section>
        </center>
    </body>
</html>
