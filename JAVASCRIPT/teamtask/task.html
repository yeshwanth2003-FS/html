const calculateGrade=(mark)=> {

    if (mark >= 90) {
        console.log("Grade A");
    }
      else if (mark >= 80) {
        console.log("Grade B");
    }
    else if (mark >= 70) {
        console.log("Grade C");

        console.log("Grade D");
    }
    else {
        console.log("Fail");
    }

}

const totalMarks=(marks)=> {

    let total = 0;

    for (let i = 0; i < marks.length; i++) {
        total += marks[i];
    }

    console.log("Total Marks =", total);
}

totalMarks([80, 75, 90, 85, 70]);

const movie_collection = (collection) => {

    let highest = collection[0];

    for (let i = 0; i < collection.length; i++) {

        if (collection[i] > highest) {

            highest = collection[i];

        }

    }

    console.log("Highest Collection =", highest);
}

movie_collection([100, 500, 600]);
