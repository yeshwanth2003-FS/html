<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <table border="1" cellpadding="10">

        <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Category</th>
            </tr>
        </thead>

        <tbody id="table">

        </tbody>

    </table>

    <br><br>

    <button onclick="takedata()">Get Data</button>
<script>

        const takedata = async () => {

            const datas = await fetch("https://dummyjson.com/products");

            const res = await datas.json();

            let result = res.products;

            let tablevalue = document.getElementById("table");

            tablevalue.innerHTML = "";

            result.forEach((product) => {

                tablevalue.innerHTML += `
                    <tr>
                        <td>${product.id}</td>
                        <td>${product.title}</td>
                        <td>${product.category}</td>
                    </tr>
                `;

            });

        }

    </script>


          









    
</body>
</html>
