<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input id="value" type="text">
    <button onclick="emoji()">click</button>
    <h2 id="revalue"></h2>

    <p id="para" style="display: block;">hi buddy,how was the day </p>
    <button onclick="hiddenpara()">click</button> <br><br>

     <p id="para2" style="display: none;">hi buddy,how was the day </p>
    <button onclick="hiddenpara2()">click</button> <br><br>

      <p id="para3" style="display: block;">hi buddy,how was the day </p>
    <button onclick="hiddenpara3()">click</button><br><br>

    <input id="name" type="text">
    <button onclick="nameuser()">click</button><br><br>

    <input id="num" type="password">
    <button onclick="password()">click</button>
    <p id="displays"></p><br><br>

    <input  id="names1" type="text" placeholder="first name"><br><br>
    <input id="names2" type="text" placeholder="last name">
    <button onclick="combine()">click</button>
    <p id="show"></p>

    <h1 id="color"onclick="changecolor()" style="background-color:brown;width: 400px ;padding:10px;font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;">welcome to my page</h1>



<script>
   

    const emoji=()=>{
           
         let display=document.getElementById("value").value;

        document.getElementById("revalue").innerText=display   
    }
    let para=document.getElementById("para")

    const hiddenpara=()=>{
           
            para.style.display="none";


    }
     let para2=document.getElementById("para2")

    const hiddenpara2=()=>{
           
            para2.style.display="block"


    }

     let para3=document.getElementById("para3")

     const hiddenpara3=()=>{

           if(para3.style.display=="block"){
               para3.style.display="none"            
                    

           }else{

             para3.style.display="block" 
           }

     }
  

     const nameuser=()=>{

        let user=document.getElementById("name").value
                
        if(user=="admin"){
            alert("Login Success")
        }else{
            alert("Invalid User")
        }

     }

    

     const password=()=>{
         let number=document.getElementById("num").value
         let displayss=document.getElementById("displays")
            if(number.length>=8){
                
                displayss.innerText="strong password"
                
            }else{
                displayss.innerText="week password"
            }

     }

     const combine=()=>{

     let showname=document.getElementById("names1").value
     let showname2=document.getElementById("names2").value

     let totalname=document.getElementById("show")

        totalname.innerText=showname+" "+showname2
    
    }
    
    let color=document.getElementById("color")

    const changecolor=()=>{

        color.style.backgroundColor="rgb(42, 235, 8)";
        color.style.fontFamily="Arial"

    }
     

    


</script>
</body>
</html>
