<!DOCTYPE html>
<html>
<head>
    <title>TailorHub</title>

    <link  rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css">
</head>
<body>

    <!-- Navbar -->

    <nav class="navbar bg-dark navbar-dark">
        <div class="container">
            <a href="#" class="navbar-brand">TailorHub</a>
        </div>
    </nav>

    <!-- Hero Section -->

    <div class="container text-center mt-5">
        <h1>Welcome to TailorHub</h1>
        <p>Connecting Tailors and Companies</p>

        <button class="btn btn-warning">
            Get Started
        </button>
    </div>

    <!-- Cards -->

    <div class="container mt-5">

        <div class="row">

            <div class="col">
                <div class="card p-3 text-center">
                    ✂ Tailor
                </div>
            </div>

            <div class="col">
                <div class="card p-3 text-center">
                    🏭 Company
                </div>
            </div>

            <div class="col">
                <div class="card p-3 text-center">
                    💼 Jobs
                </div>
            </div>

        </div>

    </div>

</body>
</html>
