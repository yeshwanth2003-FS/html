<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="flex">

  

    <div class="w-64 min-h-screen bg-slate-800 text-white p-5">

        <h2 class="text-2xl font-bold mb-6">
            Admin Panel
        </h2>

        <ul class="space-y-4">

            <li class="hover:text-yellow-400 cursor-pointer">
                Dashboard
            </li>

            <li class="hover:text-yellow-400 cursor-pointer">
                Users
            </li>

            <li class="hover:text-yellow-400 cursor-pointer">
                Courses
            </li>

            <li class="hover:text-yellow-400 cursor-pointer">
                Reports
            </li>

            <li class="hover:text-yellow-400 cursor-pointer">
                Settings
            </li>

        </ul>

    </div>

  

    <div class="flex-1 p-6">

        <h1 class="text-3xl font-bold mb-6">
            Dashboard Overview
        </h1>


        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">

            <div class="bg-white shadow-lg rounded-lg p-5 text-center">
                <h2 class="text-3xl font-bold">500</h2>
                <p>Total Users</p>
            </div>

            <div class="bg-white shadow-lg rounded-lg p-5 text-center">
                <h2 class="text-3xl font-bold">120</h2>
                <p>Courses</p>
            </div>

            <div class="bg-white shadow-lg rounded-lg p-5 text-center">
                <h2 class="text-3xl font-bold">₹50K</h2>
                <p>Revenue</p>
            </div>

            <div class="bg-white shadow-lg rounded-lg p-5 text-center">
                <h2 class="text-3xl font-bold">20</h2>
                <p>Reports</p>
            </div>

        </div>

     

        <div class="bg-white shadow-lg rounded-lg p-5 mt-8">

            <h2 class="text-2xl font-bold mb-4">
                Recent Users
            </h2>

            <table class="w-full border">

                <thead>

                    <tr class="bg-slate-800 text-white">

                        <th class="p-3">ID</th>
                        <th class="p-3">Name</th>
                        <th class="p-3">Email</th>
                        <th class="p-3">Status</th>

                    </tr>

                </thead>

                <tbody>

                    <tr class="border-b">
                        <td class="p-3">1</td>
                        <td class="p-3">John</td>
                        <td class="p-3">john@gmail.com</td>
                        <td class="p-3">Active</td>
                    </tr>

                    <tr class="border-b">
                        <td class="p-3">2</td>
                        <td class="p-3">David</td>
                        <td class="p-3">david@gmail.com</td>
                        <td class="p-3">Active</td>
                    </tr>

                    <tr>
                        <td class="p-3">3</td>
                        <td class="p-3">Sarah</td>
                        <td class="p-3">sarah@gmail.com</td>
                        <td class="p-3">Inactive</td>
                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
